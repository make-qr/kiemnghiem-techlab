    <style>
        @keyframes pulse-ring {
            0% {
                transform: scale(0.7);
                opacity: 0.8;
            }
            50% {
                opacity: 0.4;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: rotate(0); }
            10%, 30%, 50%, 70%, 90% { transform: rotate(-4deg); }
            20%, 40%, 60%, 80% { transform: rotate(4deg); }
        }
        
        .shake-animation:hover .zalo-icon {
            animation: shake 0.5s ease-in-out;
        }
        
        .shake-animation:hover .chat-icon {
            animation: shake 0.5s ease-in-out;
        }
        
        /* Chat Widget Styles */
        .chat-widget-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .chat-button {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            border-radius: 50%;
            width: 4rem;
            height: 4rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .chat-button:hover {
            transform: scale(1.1);
        }
        
        .chat-button-zalo {
            background-color: #3b82f6;
            color: white;
        }
        
        .chat-button-zalo:hover {
            background-color: #2563eb;
        }
        
        .chat-button-messenger {
            background-color: #0084ff;
            color: white;
        }
        
        .chat-button-messenger:hover {
            background-color: #0066cc;
        }
        
        .chat-button-phone {
            background-color: #16a34a;
            color: white;
        }
        
        .chat-button-phone:hover {
            background-color: #15803d;
        }
        
        .chat-icon {
            width: 2rem;
            height: 2.5rem;
        }
        
        .zalo-icon {
            width: 2.5rem;
            height: 2.5rem;
        }
        
        .pulse-effect {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            pointer-events: none;
        }
        
        .pulse-zalo {
            background-color: rgba(59, 130, 246, 0.4);
        }
        
        .pulse-messenger {
            background-color: rgba(0, 106, 255, 0.4);
        }
        
        .pulse-phone {
            background-color: rgba(22, 163, 74, 0.4);
        }
        
        .pulse-delay {
            animation-delay: 0.5s;
        }
        
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
